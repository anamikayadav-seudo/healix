<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Healix.AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="section-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card-glass p-5" style="width:400px;">

<h3 class="text-center mb-4">Login</h3>

<div class="mb-3">
<input type="email" id="email" class="form-control" placeholder="Email">
</div>

<div class="mb-3">
<input type="password" id="password" class="form-control" placeholder="Password">
</div>

<button class="btn btn-main w-100" onclick="login()">Login</button>

<p class="text-center mt-3">
Don't have an account?
<a href="register.html">Register</a>
</p>

<p class="text-center">
<a href="#">Forgot Password?</a>
</p>

<p id="message" class="mt-3 text-center"></p>

</div>

<script>
async function login(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("http://localhost:5000/login", {
        method: "POST",
        credentials: "include",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email,password})
    });

    const data = await response.json();

    if(response.ok){
        document.getElementById("message").innerHTML =
            "<span class='text-success'>Login successful. Redirecting...</span>";
        setTimeout(()=> window.location.href="scan.html",1500);
    }else{
        document.getElementById("message").innerHTML =
            "<span class='text-danger'>"+data.error+"</span>";
    }
}
</script>

</body>
</html>
